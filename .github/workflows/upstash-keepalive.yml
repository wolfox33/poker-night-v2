name: Upstash Keepalive

on:
  schedule:
    - cron: '0 9 */5 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Validate keepalive secrets
        run: |
          if [ -z "${KEEPALIVE_URL}" ]; then
            echo "Missing GitHub Actions secret: KEEPALIVE_URL"
            exit 1
          fi

          if [ -z "${KEEPALIVE_SECRET}" ]; then
            echo "Missing GitHub Actions secret: KEEPALIVE_SECRET"
            exit 1
          fi
        env:
          KEEPALIVE_URL: ${{ secrets.KEEPALIVE_URL }}
          KEEPALIVE_SECRET: ${{ secrets.KEEPALIVE_SECRET }}

      - name: Ping keepalive endpoint
        run: |
          curl --fail --show-error --silent \
            --max-time 20 \
            --header "Authorization: Bearer ${KEEPALIVE_SECRET}" \
            "${KEEPALIVE_URL}/api/keepalive"
        env:
          KEEPALIVE_URL: ${{ secrets.KEEPALIVE_URL }}
          KEEPALIVE_SECRET: ${{ secrets.KEEPALIVE_SECRET }}
