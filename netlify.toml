[build]
  command = "npm run build"
  publish = ".next/server/app"

[dev]
  command = "npm run dev"
  port = 3000

[functions]
  directory = ".next/server"

[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"